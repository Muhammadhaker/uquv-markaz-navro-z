<!doctype html>
<html lang="uz" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="google" content="notranslate" />
    
    <meta name="google-site-verification" content="googlec6d8b9942cab64fc" />
    
    <!-- 🔥 PWA (Ilova sifatida o'rnatish) kodlari -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CRM Tizim" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <title>CRM Tizim | Navro'z O'quv Markazi va G'ulomov Math Group</title>

    <meta name="description" content="O'quv markazlari uchun maxsus CRM tizimi. O'quvchilarni boshqarish, moliyaviy hisobotlar va Telegram bot orqali avtomatlashtirilgan to'lov tizimi." />

    <meta name="keywords" content="CRM tizimi, o'quv markaz, G'ulomov Math Group, Navro'z o'quv markazi, to'lovlar, avtomatlashtirish, react dashboard" />

    <meta property="og:title" content="Zamonaviy CRM Tizimi" />
    <meta property="og:description" content="O'quv markazini boshqarish uchun maxsus ishlab chiqilgan platforma." />
    <meta property="og:image" content="https://uquv-markaz-navroz.vercel.app/banner.jpg" />
    
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f8fafc;
        font-family: system-ui, -apple-system, sans-serif;
      }

      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #f8fafc;
        z-index: 99999;
      }

      .spinner {
        width: 48px;
        height: 48px;
        border: 5px solid #e0e7ff;
        border-top: 5px solid #4f46e5;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .loading-text {
        margin-top: 16px;
        color: #4f46e5;
        font-weight: 600;
        font-size: 15px;
        letter-spacing: 0.5px;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loading-text">Yuklanmoqda...</div>
      </div>
    </div>
    
    <script type="module" src="/src/main.jsx"></script>

    <script>
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }
    </script>
  </body>
</html>
